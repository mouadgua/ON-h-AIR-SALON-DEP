<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onhair.ma | Rénovation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --black: #0a0a0a;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--black);
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animation Space / Particules Dorées */
        #canvas-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            letter-spacing: 12px;
            margin: 0;
            text-transform: uppercase;
            color: var(--gold);
            animation: fadeIn 2.5s ease-out;
        }

        .separator {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 30px auto;
            animation: expand 1.5s ease-in-out forwards;
        }

        .sub-text {
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 200;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .name {
            color: var(--gold);
            font-weight: 400;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes expand {
            from { width: 0; }
            to { width: 80px; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-stars"></canvas>

    <div class="content">
        <h1 class="logo-text">ON h'AIR</h1>
        <div class="separator"></div>
        <p class="sub-text">Bientôt une nouvelle expérience</p>
    </div>

    <div class="footer">
        Design par <span class="name"> <a href="https://mouad-guarraz.site" style="text-decoration: none;" target="_blank"> Mouad Guarraz </a></span> | © onhair.ma
    </div>

    <script>
        const canvas = document.getElementById('canvas-stars');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#c5a059"; // Couleur Dorée
            
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed; // Les particules montent doucement
                if (p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
